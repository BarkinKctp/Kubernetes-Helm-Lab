apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - ../../base

patchesStrategicMerge:
  - replicas.yaml

configMapGenerator:
  - name: kustom-map-dev
    env: config.properties

replacements:
  - source:
      kind: ConfigMap
      name: kustom-map-dev
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - spec.template.spec.containers.*.envFrom.*.configMapRef.name
