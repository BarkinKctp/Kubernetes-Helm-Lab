apiVersion: v1
kind: Namespace
metadata:
  name: dev
  labels:
    env: dev
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-quota
  namespace: dev
spec:
  hard:
    pods: "10"
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-service
  namespace: dev
  labels:
    app: webapp
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: webapp
    tier: frontend
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-configv1.0
  namespace: dev
data:
  BG_COLOR: lightblue
  FONT_COLOR: darkblue
  CUSTOM_HEADER: "Welcome to the Webapp v1.0"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-deployment
  namespace: dev
  labels:
    app: webapp
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webapp
      tier: frontend
  template:
    metadata:
      labels:
        app: webapp
        tier: frontend
    spec:
      containers:
      - name: webapp
        image: brkndocker/webapp:latest
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: webapp-configv1.0
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "250m"
            memory: "128Mi"
       